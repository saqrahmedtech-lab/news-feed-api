<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article — The Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f4ef;
        --ink: #1a1814;
        --ink-light: #4a4540;
        --ink-faint: #8a847e;
        --rule: #d6d0c8;
        --accent: #b5260e;
        --font-display: "Playfair Display", Georgia, serif;
        --font-body: "Source Serif 4", Georgia, serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 18px;
        line-height: 1.75;
        min-height: 100vh;
      }

      a { color: inherit; text-decoration: none; }

      /* ── Nav ── */
      .site-nav {
        border-bottom: 1px solid var(--rule);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }

      .nav-back {
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        color: var(--accent);
        text-transform: uppercase;
        cursor: pointer;
        border: none;
        background: none;
        font-family: var(--font-body);
        padding: 0;
      }

      .nav-back:hover { text-decoration: underline; }

      .nav-logo {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--ink);
        margin-left: auto;
      }

      /* ── Article ── */
      .article-wrap {
        max-width: 720px;
        margin: 4rem auto;
        padding: 0 2rem 6rem;
      }

      .article-tag {
        display: inline-block;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 0.2rem 0.7rem;
        margin-bottom: 1.5rem;
      }

      .article-title {
        font-family: var(--font-display);
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 700;
        line-height: 1.15;
        color: var(--ink);
        margin-bottom: 1.5rem;
      }

      .article-meta {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        font-size: 0.85rem;
        color: var(--ink-faint);
        padding-bottom: 1.5rem;
        border-bottom: 2px solid var(--ink);
        margin-bottom: 2.5rem;
      }

      .article-author { color: var(--ink-light); font-weight: 400; }

      .article-body {
        font-size: 1.1rem;
        line-height: 1.85;
        color: var(--ink-light);
      }

      /* ── Not found ── */
      .not-found {
        text-align: center;
        padding: 6rem 2rem;
        color: var(--ink-faint);
      }

      .not-found h2 {
        font-family: var(--font-display);
        font-size: 2rem;
        margin-bottom: 1rem;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <button class="nav-back" onclick="history.back()">← Back</button>
      <span class="nav-logo">The Dispatch</span>
    </nav>

    <div class="article-wrap" id="article-content"></div>

    <script>
      const id = new URLSearchParams(window.location.search).get("id");
      const container = document.getElementById("article-content");

      if (!id) {
        container.innerHTML = `
          <div class="not-found">
            <h2>Article not found</h2>
            <p>Please go back and select an article.</p>
          </div>`;
      } else {
        fetch(`/api/article/${id}`)
          .then((r) => r.json())
          .then(({ data }) => {
            document.title = `${data.title} — The Dispatch`;
            container.innerHTML = `
              <div class="article-tag">${data.tag}</div>
              <h1 class="article-title">${data.title}</h1>
              <div class="article-meta">
                <span class="article-author">${data.author}</span>
                <span>${data.date}</span>
                <span>${data.readTime}</span>
              </div>
              <p class="article-body">${data.description}</p>`;
          })
          .catch(() => {
            container.innerHTML = `
              <div class="not-found">
                <h2>Article not found</h2>
                <p>Please go back and select an article.</p>
              </div>`;
          });
      }
    </script>
  </body>
</html>
